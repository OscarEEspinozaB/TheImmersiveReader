<!DOCTYPE html>
<html lang="en" data-theme="midnight">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>The Immersive Reader</title>
    <meta name="theme-color" content="#000000" />
    <link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32.png" />
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body>
    <!-- Top bar: title + menu. Auto-hides while reading; a tap (mobile) or mouse
         move (desktop) brings it back, together with the bottom pager. -->
    <header id="topbar" class="topbar">
      <button id="shelf-button" class="menu-toggle" type="button" aria-label="Back" title="Back">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" /><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
        </svg>
      </button>
      <span class="brand">The Immersive Reader</span>
      <button id="menu-toggle" class="menu-toggle" type="button" aria-label="Menu" aria-expanded="false">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 6h16" /><path d="M4 12h16" /><path d="M4 18h16" />
        </svg>
      </button>
    </header>

    <nav id="menu" class="menu" hidden>
      <details class="menu__section">
        <summary class="menu__section-label">Reading</summary>
        <label class="menu__field">
          <span>Mode</span>
          <select id="reading-mode-select">
            <option value="paged">Paged</option>
            <option value="continuous">Continuous</option>
          </select>
        </label>
        <label class="menu__field">
          <span>Font</span>
          <select id="reading-font-select"></select>
        </label>
        <label class="menu__field">
          <span>Size</span>
          <select id="reading-size-select"></select>
        </label>
        <label class="menu__field">
          <span>Line spacing</span>
          <select id="reading-linespacing-select"></select>
        </label>
        <label class="menu__field" id="voice-field">
          <span>Voice</span>
          <select id="voice-select">
            <option value="">Auto (language default)</option>
          </select>
        </label>
        <label class="menu__field" id="voice-rate-field">
          <span>Voice speed</span>
          <select id="voice-rate-select">
            <option value="0.6">Very slow</option>
            <option value="0.75">Slow</option>
            <option value="0.9">Normal</option>
            <option value="1">Native</option>
            <option value="1.15">Fast</option>
            <option value="1.3">Very fast</option>
          </select>
        </label>
        <label class="menu__field">
          <span>Book language</span>
          <select id="reading-lang-select"></select>
        </label>
        <label class="menu__field">
          <span>My language</span>
          <select id="lang-select"></select>
        </label>
      </details>

      <details class="menu__section">
        <summary class="menu__section-label">Server &amp; sync</summary>
        <label class="menu__field">
          <span>Home server</span>
          <input id="kb-url" type="text" placeholder="http://192.168.100.6:4321" autocomplete="off" />
        </label>
        <label class="menu__field">
          <span>Profile</span>
          <input id="profile-name" type="text" placeholder="e.g. oscar (syncs your progress)" autocomplete="off" />
        </label>
        <label class="menu__field">
          <span>AI model</span>
          <select id="ai-model-select">
            <option value="">Server default</option>
          </select>
        </label>
      </details>

      <!-- Android only (src/main.js unhides it on native): the APK updates its web
           bundle over the air, and has no address bar to recover from a bad one. -->
      <details class="menu__section" id="app-update-section" hidden>
        <summary class="menu__section-label">App updates</summary>
        <label class="menu__field">
          <span>Update URL</span>
          <input id="update-url" type="text" placeholder="same as home server" autocomplete="off" />
        </label>
        <button id="check-update" class="menu__item" type="button">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12a9 9 0 1 1-3-6.7L21 8" /><path d="M21 3v5h-5" />
          </svg>
          <span>Check for updates</span>
        </button>
        <button id="reset-app" class="menu__item menu__item--danger" type="button">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 14 4 9l5-5" /><path d="M4 9h11a5 5 0 0 1 0 10H9" />
          </svg>
          <span>Previous version</span>
        </button>
      </details>

      <details class="menu__section">
        <summary class="menu__section-label">Data</summary>
        <button id="export-words" class="menu__item" type="button">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 4v12" /><path d="m7 11 5 5 5-5" /><path d="M5 20h14" />
          </svg>
          <span>Export words</span>
        </button>

        <label class="menu__item">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 20V8" /><path d="m7 13 5-5 5 5" /><path d="M5 4h14" />
          </svg>
          <span>Import words</span>
          <input id="import-words" type="file" accept=".json,application/json" hidden />
        </label>

        <button id="reset-data" class="menu__item menu__item--danger" type="button">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12a9 9 0 1 0 3-6.7L3 8" /><path d="M3 3v5h5" />
          </svg>
          <span>Reset vocabulary</span>
        </button>
      </details>

      <!-- Android only (src/main.js unhides it on native): which on-device
           translation models are installed, and a way to fetch one on purpose.
           Downloading happens by itself on WiFi, but only VISIBLY here — a model
           that never arrives is otherwise indistinguishable from a broken app. -->
      <details class="menu__section" id="translation-section" hidden>
        <summary class="menu__section-label">Offline translation</summary>
        <p class="menu__hint" id="model-status">Checking…</p>
        <div id="model-buttons"></div>
      </details>

      <!-- A WebView has no devtools, so a failure on the phone is invisible. This
           captures what the app said about itself and dumps it into a note, which
           is already an editable, readable, copyable document (src/diagnostics.js). -->
      <details class="menu__section">
        <summary class="menu__section-label">Diagnostics</summary>
        <label class="menu__item">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m9 18 6-6-6-6" /><path d="M13 20h6" />
          </svg>
          <span>Detailed log</span>
          <input id="verbose-log" type="checkbox" class="menu__toggle" />
        </label>
        <button id="log-to-note" class="menu__item" type="button">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 3v4a1 1 0 0 0 1 1h4" /><path d="M17 21H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7l5 5v11a2 2 0 0 1-2 2z" /><path d="M9 13h6" /><path d="M9 17h3" />
          </svg>
          <span>Save log to Notes</span>
        </button>
        <button id="copy-log" class="menu__item" type="button">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="12" height="12" rx="2" /><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
          </svg>
          <span>Copy log</span>
        </button>
        <button id="clear-log" class="menu__item menu__item--danger" type="button">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 6h18" /><path d="M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2" /><path d="M6 6v14a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V6" />
          </svg>
          <span>Clear log</span>
        </button>
        <p class="menu__hint" id="log-count"></p>
      </details>

      <details class="menu__section">
        <summary class="menu__section-label">Theme</summary>
        <div id="theme-swatches" class="menu__themes"></div>
      </details>

      <!-- Which web bundle is running (Android only). Deliberately OUTSIDE the
           collapsible sections: "did the update land?" must be answerable by
           opening the menu, not by hunting through it. -->
      <div class="menu__version" id="app-version" hidden></div>
    </nav>

    <!-- My Books: the home screen. Lists the books saved on this device; open one
         to read. Books enter only by file and are read-only (see Notes for the
         editable kind). -->
    <section id="shelf" class="shelf" hidden>
      <header class="shelf__bar">
        <span class="shelf__heading">My Books</span>
        <div class="shelf__actions">
          <select id="sort-select" class="shelf__sort" title="Sort by"></select>
          <button id="view-toggle" class="file-button" type="button" title="List / grid" aria-label="Toggle view">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="7" height="7" /><rect x="14" y="3" width="7" height="7" />
              <rect x="3" y="14" width="7" height="7" /><rect x="14" y="14" width="7" height="7" />
            </svg>
          </button>
          <label class="file-button file-button--accent" title="Add book from a file">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 3v4a1 1 0 0 0 1 1h4" /><path d="M17 21H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7l5 5v11a2 2 0 0 1-2 2z" /><path d="M12 11v6" /><path d="M9 14h6" />
            </svg>
            <input id="add-book" type="file" accept=".txt,.md,.pdf,.epub,.tir" hidden />
          </label>
        </div>
      </header>
      <div id="shelf-grid" class="shelf__grid" data-view="grid"></div>
    </section>

    <!-- Notes: editable text documents the reader writes or pastes. "New" opens the
         editor; a note opens in the same reader as a book and can be edited. -->
    <section id="notes" class="shelf" hidden>
      <header class="shelf__bar">
        <span class="shelf__heading">Notes</span>
        <div class="shelf__actions">
          <select id="notes-sort-select" class="shelf__sort" title="Sort by"></select>
          <button id="notes-view-toggle" class="file-button" type="button" title="Cards / list" aria-label="Toggle view">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="7" height="7" /><rect x="14" y="3" width="7" height="7" />
              <rect x="3" y="14" width="7" height="7" /><rect x="14" y="14" width="7" height="7" />
            </svg>
          </button>
          <label class="file-button" title="Import a .md or .txt as a note">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 3v4a1 1 0 0 0 1 1h4" /><path d="M17 21H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7l5 5v11a2 2 0 0 1-2 2z" /><path d="M12 11v6" /><path d="M9 14h6" />
            </svg>
            <input id="import-note" type="file" accept=".txt,.md,.markdown,.text" hidden />
          </label>
          <button id="new-note" class="file-button file-button--accent" type="button" title="New note" aria-label="New note">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" /><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4z" />
            </svg>
          </button>
        </div>
      </header>
      <div id="notes-grid" class="shelf__grid notes-grid" data-view="cards"></div>
    </section>

    <!-- Note editor: write or paste, then Save. A blank editor for a new note, or
         a note's own text reopened for editing. Not a hub — it hides the nav. -->
    <section id="editor" class="editor" hidden>
      <header class="editor__bar">
        <button id="editor-back" class="menu-toggle" type="button" aria-label="Back" title="Back">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 18l-6-6 6-6" />
          </svg>
        </button>
        <span id="editor-heading" class="editor__heading">New note</span>
        <button id="editor-settings" class="menu-toggle" type="button" aria-label="Note settings" title="Note settings">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3" /><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
          </svg>
        </button>
        <button id="editor-save" class="editor__save" type="button">Save</button>
      </header>
      <div class="editor__doc">
        <input id="editor-title" class="editor__title" type="text" placeholder="Title (optional)" autocomplete="off" />
        <textarea id="editor-text" class="editor__text" placeholder="Write your note, or paste a text to listen to it…" spellcheck="false"></textarea>
      </div>
      <div class="editor__toolbar">
        <button id="editor-paste" class="editor__paste" type="button">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="8" y="2" width="8" height="4" rx="1" /><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2" />
          </svg>
          <span>Paste</span>
        </button>
        <span id="editor-count" class="editor__count">0 words</span>
      </div>

      <!-- Note settings popover: opened by the gear in the editor bar. -->
      <div id="editor-settings-menu" class="editor-settings" hidden>
        <label class="editor-settings__field">
          <span>Note language</span>
          <select id="editor-lang-select"></select>
        </label>
        <label class="editor-settings__field">
          <span>Editor font</span>
          <select id="editor-font-select"></select>
        </label>
        <label class="editor-settings__field">
          <span>Text size</span>
          <select id="editor-size-select"></select>
        </label>
        <label class="editor-settings__field">
          <span>Line spacing</span>
          <select id="editor-linespacing-select"></select>
        </label>
      </div>
    </section>

    <!-- Library: the home server's shared catalog; add books into My Books, or
         remove them from the Library. -->
    <section id="server-shelf" class="shelf" hidden>
      <header class="shelf__bar">
        <span class="shelf__heading">Library Server</span>
        <div class="shelf__actions">
          <button id="server-refresh" class="menu-toggle" type="button" title="Refresh" aria-label="Refresh">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12a9 9 0 1 1-3-6.7L21 8" /><path d="M21 3v5h-5" />
            </svg>
          </button>
        </div>
      </header>
      <div id="server-shelf-grid" class="shelf__grid" data-view="grid"></div>
    </section>

    <!-- Shared container for the Dictionary and Progress hub views. -->
    <section id="dashboard" class="dashboard" hidden></section>

    <!-- Word Swiper: Tinder-style vocabulary practice. -->
    <section id="swiper" class="swiper" hidden></section>

    <main class="reader-wrap" aria-live="polite" hidden>
      <div id="reader" class="reader"></div>
    </main>

    <!-- Reading status bar: which book is open (left) and how far in it we are
         (right). Present in both reading modes; only the page arrows are paged-only. -->
    <footer id="pager" class="pager" hidden>
      <span id="page-book" class="pager__book"></span>
      <div class="pager__nav">
        <button id="prev-page" type="button" disabled>&#9664;</button>
        <span id="page-indicator" class="pager__indicator">—</span>
        <button id="next-page" type="button" disabled>&#9654;</button>
      </div>
    </footer>

    <!-- Primary navigation: first-level hub destinations. Hidden while reading
         and in the swiper (those are immersive). -->
    <nav id="primary-nav" class="primary-nav">
      <button id="nav-library" class="nav-item" type="button">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" /><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
        </svg>
        <span>My Books</span>
      </button>
      <button id="nav-notes" class="nav-item" type="button">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 3v4a1 1 0 0 0 1 1h4" /><path d="M17 21H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7l5 5v11a2 2 0 0 1-2 2z" /><path d="M9 13h6" /><path d="M9 17h4" />
        </svg>
        <span>Notes</span>
      </button>
      <button id="nav-server" class="nav-item" type="button">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 3 3 8h18z" /><path d="M5 8v10M9 8v10M15 8v10M19 8v10" /><path d="M3 21h18" />
        </svg>
        <span>Library</span>
      </button>
      <button id="nav-dictionary" class="nav-item" type="button">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" /><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" />
        </svg>
        <span>Dictionary</span>
      </button>
      <button id="nav-progress" class="nav-item" type="button">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 3v18h18" /><path d="m7 14 4-4 3 3 5-6" />
        </svg>
        <span>Progress</span>
      </button>
    </nav>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
